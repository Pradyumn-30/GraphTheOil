[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "telemetry-sentinel"
version = "4.0.0"
description = "Geopolitical Oil Trade and Risks Intelligence Platform"
readme = "README.md"
requires-python = ">=3.10"
authors = [
    { name = "Pradyumn Srivastava" }
]
# Extracted top-level dependencies directly from your requirements.txt
dependencies = [
    # UI & Core
    "streamlit==1.55.0",
    "python-dotenv==1.2.2",
    "pandas==2.3.3",
    "pydantic==2.12.5",
    
    # LangChain Ecosystem
    "langchain==1.2.13",
    "langchain-core==1.2.20",
    "langchain-community==0.4.1",
    "langchain-groq==1.1.2",
    "langchain-openai==1.1.11",
    
    # Orchestration & Telemetry
    "langgraph==1.1.3",
    "langgraph-sdk==0.3.12",
    "langsmith==0.7.22",
    
    # APIs & Database
    "groq==0.37.1",
    "openai==2.29.0",
    "neo4j==6.1.0",
    "neo4j-graphrag==1.14.0",
    
    # Machine Learning Core
    "torch==2.11.0",
    "transformers==5.4.0",
    # ADDED: This explicitly fixes the Streamlit File Watcher Error
    "torchvision>=0.16.0" 
]

[project.optional-dependencies]
# Dependencies specifically for running the eval_app.py script
eval = [
    "ragas==0.4.3",
    "datasets==4.8.4",
    "sentence-transformers==5.3.0",
    "scikit-learn==1.8.0"
]

[tool.setuptools.packages.find]
where = ["."]
include = ["*"]
exclude = ["tests*", "data*"]

[tool.pytest.ini_options]
minversion = "6.0"
addopts = "-ra -q"
testpaths = [
    "tests",
]