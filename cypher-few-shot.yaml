_type: few_shot
input_variables: ["question", "schema","error", "latest_year"]
prefix: |
  You are a Neo4j expert. 
  Your task is to convert English questions into high-performance Cypher queries based on the provided schema.
  
  CRITICAL RULES:
  1. RELATIONSHIP DIRECTION: All trade relationships follow the pattern: (Importer:Country)-[:IMPORTED_FROM]->(Exporter:Country)
  2. NAMES: Map common country names to database values (e.g., 'Russia' or 'Russians' must be 'Russian Federation').
  3. PERFORMANCE: Always use the (Importer)-[:IMPORTS_IN]->(t:YearMonth) relationship to filter by time before performing aggregations. 
     This is more efficient than filtering only by relationship properties.
  4. Use f.barrels for volume, f.price_mt for price, and f.year_month for the period identifier.
  5. TEMPORAL DEFAULT: If the user DOES NOT specify a year/month, you MUST use the static latest year provided here: {latest_year}.
     - USE: "MATCH (importer:Country)-[:IMPORTS_IN]->(tm:YearMonth) WHERE tm.yearMonth / 100 = {latest_year}"
     - NEVER calculate max(t.yearMonth) dynamically. Use the provided {latest_year} directly.
  6. REGIONAL LOGIC: The Country node has a region property.
     - Available Regions: 'Middle East', 'CIS & Central Asia', 'North America', 'South & Central America & Caribbean', 'Europe', 'Africa', 'South Asia', 'South East Asia', 'East Asia & Oceania'.
     - For Region Exports: Filter the partner (p) node: (Importer:Country)-[f]->(Exporter:Country {{region: 'Region Name'}}).
     - For Region Imports: Filter the reporter (r) node: (Importer:Country {{region: 'Region Name'}})-[f]->(Exporter:Country).
  7. ADVANCED MATH & STATISTICS: Neo4j lacks certain built-in statistical functions. 
     - For VARIANCE: You MUST use stDevP(expression) ^ 2. NEVER use variance() or apoc.math.variance().
     - For QUANTILE: You MUST use percentileCont(expression, 0.5). NEVER use median() or quantile().
  8. ANNUAL AGGREGATION: When asked for top entities over an entire year
      you MUST aggregate and sum the volumes across all months (e.g., WITH importer, sum(f.barrels)) BEFORE applying the ORDER BY and LIMIT clauses.
      Do not include tm.yearMonth in the WITH clause during annual aggregations, as it will cause the query to return monthly records instead of yearly totals.
  9. UNITS: All volume outputs MUST be converted to Millions of Barrels. Divide the raw barrels by 1000000 (e.g., f.barrels / 1000000).
  10. OUTPUT: Use descriptive aliases for returned values.

  ALWAYS APPLY THE ROUND(value, 2) FUNCTION TO ALL NUMERICAL RESULTS.
  
  Always use LIMIT 3 unless asked otherwise.

  {error}
  If an error is provided above, analyze the Cypher syntax error and provide a corrected query.

  Schema: 
  {schema}

example_prompt:
  _type: prompt
  input_variables: ["question", "query"]
  template: "User Question: {question}\nCypher Query: {query}"

examples:
  - question: "Show me total volume and average price for Russia to India trade."
    query: |
      // As no month is specified, we aggregate all months in the latest_year to avoid single-month bias
      MATCH (importer:Country {{name: 'India'}})-[:IMPORTS_IN]->(tm:YearMonth)
      WHERE tm.yearMonth / 100 = {latest_year}
      MATCH (importer)-[f:IMPORTED_FROM {{year_month: tm.yearMonth}}]->(exporter:Country {{name: 'Russian Federation'}})
      RETURN ROUND(sum(f.barrels)/1000000,2) AS total_volume_barrels_in_millions,
          tm.yearMonth / 100 AS year,
          ROUND(avg(f.price_mt),2) AS average_price_in_dollars

  - question: "Which country exported the most barrels to the USA in Jan 2024?"
    query: |
      MATCH (importer:Country {{name: 'USA'}})-[:IMPORTS_IN]->(t:YearMonth {{yearMonth: 202401}})
      MATCH (importer)-[f:IMPORTED_FROM {{year_month: 202401}}]->(exporter:Country)
      RETURN exporter.name AS exporter, ROUND(f.barrels/1000000,2) AS  total_barrels_imported_in_millions,
      t.yearMonth / 100 AS year 
      ORDER BY total_barrels_imported_in_millions DESC LIMIT 1

  - question: "Which exporter has the lowest variance in monthly volume sent to India over the last 12 months?"
    query: |
      MATCH (importer:Country {{name: 'India'}})-[:IMPORTS_IN]->(tm:YearMonth)
      // 1. Dynamic Year Filter
      WHERE tm.yearMonth / 100 = {latest_year}
      MATCH (importer)-[f:IMPORTED_FROM {{year_month: tm.yearMonth}}]->(exporter:Country)

      // Aggregate to get monthly volumes first
      WITH exporter, tm.yearMonth AS month, sum(f.barrels) AS monthly_vol
      WITH exporter, collect(monthly_vol) AS monthly_vols

      // Only calculate variance for continuous, 12-month suppliers
      WHERE size(monthly_vols) = 12

      // Calculate variance using population standard deviation squared
      UNWIND monthly_vols AS vol
      WITH exporter, stDevP(vol) ^ 2 AS variance_raw

      // Ensure we only consider exporters with consistent data
      WHERE variance_raw > 0

      RETURN exporter.name AS exporter,
            {latest_year} AS year, // 2. Dynamic Year Injection
            ROUND(variance_raw, 2) AS variance_in_million_sq
      ORDER BY variance_in_million_sq ASC
      LIMIT 1

  - question: "Which countries have the highest risk or potential loss based on reliance on Russia?"
    query: |
      // As no month is specified, we aggregate all months in the latest_year to avoid single-month bias
      MATCH (importer:Country)-[:IMPORTS_IN]->(tm:YearMonth)
      WHERE tm.yearMonth / 100 = {latest_year}
      MATCH (importer)-[f:IMPORTED_FROM {{year_month: tm.yearMonth}}]->(exporter:Country)
      WITH importer,
            sum(CASE WHEN exporter.name = 'Russian Federation' THEN f.barrels ELSE 0 END) AS russian_vol,
            sum(f.barrels) AS total_vol
      // We filter for total_vol > 1M to remove tiny partners like Georgia/Armenia
      WHERE total_vol > 1000000
      RETURN importer.name AS country, 
              tm.yearMonth / 100 AS year, 
              ROUND(russian_vol / 1000000, 2) AS barrels_from_russia_in_millions,
              ROUND((russian_vol / total_vol) * 100, 2) AS reliance_percent
      ORDER BY barrels_from_russia_in_millions DESC 
      LIMIT 5

  - question: "Which country in South East Asia exported the most oil in 2024?"
    query: |
      MATCH (r:Country)-[:IMPORTS_IN]->(tm:YearMonth)
      WHERE tm.yearMonth / 100 = 2024
      // Filter for partners in South East Asia to identify the exporter
      MATCH (r)-[f:IMPORTED_FROM {{year_month: tm.yearMonth}}]->(p:Country {{region: 'South East Asia'}})
      RETURN p.name AS exporter, 
            tm.yearMonth / 100 AS year, 
            ROUND(sum(f.barrels) / 1000000, 2) AS total_exported_millions
      ORDER BY total_exported_millions DESC 
      LIMIT 1

suffix: "Question: {question}\nCypher Query: "